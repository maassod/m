<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="HandheldFriendly" content="true" />
  <title>CHAT_ROOM</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, query,
      orderBy, limit, onSnapshot, serverTimestamp,
      getDocs, deleteDoc, doc
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBLczKyVaqT89GN_o_bY7E1F1AFthFultg",
      authDomain:        "proj-89c9c.firebaseapp.com",
      projectId:         "proj-89c9c",
      storageBucket:     "proj-89c9c.firebasestorage.app",
      messagingSenderId: "232360265495",
      appId:             "1:232360265495:web:8e54dad001ec00960ed952"
    };

    const app = initializeApp(firebaseConfig);
    const db  = collection(getFirestore(app), "messages");
    const MAX_MESSAGES = 50;

    const messagesEl = document.getElementById("messages");

    function renderMessage(data) {
      const line = document.createElement("div");
      line.className = "msg-line";
      const text = document.createElement("span");
      text.className = "msg-text";
      text.textContent = data.text;
      line.appendChild(text);
      messagesEl.appendChild(line);
    }

    const q = query(db, orderBy("timestamp", "asc"), limit(MAX_MESSAGES));
    onSnapshot(q, (snapshot) => {
      messagesEl.innerHTML = "";
      snapshot.forEach(docSnap => renderMessage(docSnap.data()));
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    async function enforceLimit() {
      const snap = await getDocs(query(db, orderBy("timestamp", "asc")));
      if (snap.size >= MAX_MESSAGES)
        await deleteDoc(doc(getFirestore(app), "messages", snap.docs[0].id));
    }

    /* حذف الرسائل التي مضى عليها أكثر من 10 دقائق */
    const TEN_MIN = 10 * 60 * 1000;

    async function deleteExpiredMessages() {
      const snap = await getDocs(query(db, orderBy("timestamp", "asc")));
      const now = Date.now();
      const deletions = [];
      snap.forEach(docSnap => {
        const ts = docSnap.data().timestamp;
        if (!ts) return;
        const msgTime = ts.toMillis ? ts.toMillis() : ts;
        if (now - msgTime > TEN_MIN)
          deletions.push(deleteDoc(doc(getFirestore(app), "messages", docSnap.id)));
      });
      if (deletions.length) await Promise.all(deletions);
    }

    /* تشغيل الحذف فور فتح الصفحة ثم كل دقيقة */
    deleteExpiredMessages();
    setInterval(deleteExpiredMessages, 60 * 1000);

    const inputEl = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");
    const statusEl = document.getElementById("status");

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      if (text.length > 500) { showStatus("الرسالة طويلة جداً"); return; }

      sendBtn.disabled = true;
      inputEl.disabled = true;

      try {
        await enforceLimit();
        await addDoc(db, { text, timestamp: serverTimestamp() });
        inputEl.value = "";
        showStatus("");
      } catch (err) {
        showStatus("فشل الإرسال");
        console.error(err);
      } finally {
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    let statusTimer;
    function showStatus(msg) {
      statusEl.textContent = msg;
      clearTimeout(statusTimer);
      if (msg) statusTimer = setTimeout(() => { statusEl.textContent = ""; }, 3000);
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0f1a;
      --bg2:      #0f1629;
      --fg:       #e8eaf6;
      --dim:      #6b7db3;
      --border:   #1e2d50;
      --hover-bg: #131d33;
      --btn-bg:   #1e2d50;
      --btn-hover:#2a3f70;
      --accent:   #4a6fa5;
      --font:     -apple-system, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      --radius:   18px;
    }

    html {
      touch-action: manipulation;
      -ms-touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 1rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    #messages:empty::after {
      content: "ابدأ المحادثة...";
      color: var(--dim);
      font-size: 0.9rem;
      padding-top: 1.5rem;
      display: block;
      text-align: center;
    }

    /* ── MSG BUBBLE — بدون إطار ── */
    .msg-line {
      display: inline-flex;
      align-self: flex-start;
      background: transparent;
      border: none;
      padding: 0.15rem 0.4rem;
      max-width: 90%;
    }

    .msg-text {
      word-break: break-word;
      white-space: pre-wrap;
      color: var(--fg);
      font-size: 1rem;
    }

    /* ── INPUT AREA ── */
    #input-area {
      flex-shrink: 0;
      padding: 0.75rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      background: var(--bg);
    }

    #input-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    #msg-input {
      flex: 1;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      color: var(--fg);
      font-family: var(--font);
      font-size: 1rem;
      padding: 0.75em 1.1em;
      -webkit-user-drag: none;
      transition: border-color 0.15s;
      min-height: 52px;
    }

    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--dim); }
    #msg-input:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── SEND BUTTON ── */
    #send-btn {
      background: var(--btn-bg);
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      width: 52px;
      height: 52px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { background: var(--btn-hover); }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #send-btn svg {
      width: 22px;
      height: 22px;
      color: var(--fg);
      stroke: var(--fg);
    }

    /* ── STATUS ── */
    #status {
      font-size: 0.75rem;
      color: var(--dim);
      padding-inline-start: 0.5rem;
      min-height: 1em;
    }

    @media (max-width: 600px) {
      #msg-input { font-size: 1rem; }
    }

    body { -webkit-user-drag: none; }
  </style>

</head>
<body>
  <div id="app">


<main id="messages" role="log" aria-live="polite"></main>

<footer id="input-area">
  <div id="input-row">
    <input
      id="msg-input"
      type="text"
      maxlength="500"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <button id="send-btn" aria-label="إرسال">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 15 12 8 19 15"/>
      </svg>
    </button>
  </div>
  <span id="status" aria-live="assertive"></span>
</footer>

  </div>

  <script>
    ["dragover", "dragenter", "drop"].forEach(evt => {
      document.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
    });
  </script>

</body>
</html>

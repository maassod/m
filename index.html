<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="HandheldFriendly" content="true" />
  <title>CHAT_ROOM</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, query,
      orderBy, limit, onSnapshot, serverTimestamp,
      getDocs, deleteDoc, doc
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBLczKyVaqT89GN_o_bY7E1F1AFthFultg",
      authDomain:        "proj-89c9c.firebaseapp.com",
      projectId:         "proj-89c9c",
      storageBucket:     "proj-89c9c.firebasestorage.app",
      messagingSenderId: "232360265495",
      appId:             "1:232360265495:web:8e54dad001ec00960ed952"
    };

    const app = initializeApp(firebaseConfig);
    const db  = collection(getFirestore(app), "messages");
    const MAX_MESSAGES = 50;
    const TEN_MIN = 10 * 60 * 1000;

    const messagesEl = document.getElementById("messages");

    /* رسم رسالة مع أنيميشن ظهور سريع */
    function renderMessage(data, animate) {
      const line = document.createElement("div");
      line.className = "msg-line" + (animate ? " msg-new" : "");
      const text = document.createElement("span");
      text.className = "msg-text";
      text.textContent = data.text;
      line.appendChild(text);
      messagesEl.appendChild(line);
    }

    /* الاستماع الفوري */
    const q = query(db, orderBy("timestamp", "asc"), limit(MAX_MESSAGES));
    let firstLoad = true;

    onSnapshot(q, (snapshot) => {
      messagesEl.innerHTML = "";
      snapshot.forEach((docSnap, i) => {
        renderMessage(docSnap.data(), !firstLoad);
      });
      firstLoad = false;
      /* الفراغ في الأعلى: آخر رسالة تظهر في الأسفل */
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    /* حذف الأقدم عند تجاوز الحد */
    async function enforceLimit() {
      const snap = await getDocs(query(db, orderBy("timestamp", "asc")));
      if (snap.size >= MAX_MESSAGES)
        await deleteDoc(doc(getFirestore(app), "messages", snap.docs[0].id));
    }

    /* حذف الرسائل منتهية الصلاحية (10 دقائق) */
    async function deleteExpiredMessages() {
      const snap = await getDocs(query(db, orderBy("timestamp", "asc")));
      const now = Date.now();
      const deletions = [];
      snap.forEach(docSnap => {
        const ts = docSnap.data().timestamp;
        if (!ts) return;
        const msgTime = ts.toMillis ? ts.toMillis() : ts;
        if (now - msgTime > TEN_MIN)
          deletions.push(deleteDoc(doc(getFirestore(app), "messages", docSnap.id)));
      });
      if (deletions.length) await Promise.all(deletions);
    }

    deleteExpiredMessages();
    setInterval(deleteExpiredMessages, 60 * 1000);

    const inputEl = document.getElementById("msg-input");

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      if (text.length > 500) return;

      /* لا نعطّل الحقل حتى لا يختفي الكيبورد */
      inputEl.value = "";

      try {
        await enforceLimit();
        await addDoc(db, { text, timestamp: serverTimestamp() });
      } catch (err) {
        console.error(err);
      }

      /* إبقاء التركيز على الحقل دائماً */
      inputEl.focus();
    }

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    /* منع إخفاء الكيبورد عند لمس منطقة الرسائل */
    messagesEl.addEventListener("touchstart", (e) => {
      e.preventDefault();
    }, { passive: false });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0b0f1a;
      --bg2:    #0f1629;
      --fg:     #e8eaf6;
      --dim:    #6b7db3;
      --border: #1e2d50;
      --accent: #4a6fa5;
      --font:   -apple-system, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      --radius: 18px;
    }

    html {
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 1rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* الرسائل: flex-end يجعل الأولى في الأسفل والفراغ في الأعلى */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 0.45rem;
      scroll-behavior: smooth;
      overscroll-behavior: none;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* رسالة بدون إطار */
    .msg-line {
      display: inline-flex;
      align-self: flex-start;
      padding: 0.15rem 0.4rem;
      max-width: 90%;
    }

    /* أنيميشن ظهور الرسالة الجديدة */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-new {
      animation: fadeUp 0.18s ease-out forwards;
    }

    .msg-text {
      word-break: break-word;
      white-space: pre-wrap;
      color: var(--fg);
      font-size: 1rem;
    }

    /* منطقة الإدخال */
    #input-area {
      flex-shrink: 0;
      padding: 0.75rem 1rem 1rem;
      background: var(--bg);
    }

    #msg-input {
      width: 100%;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      color: var(--fg);
      font-family: var(--font);
      font-size: 1rem;
      padding: 0.75em 1.1em;
      -webkit-user-drag: none;
      transition: border-color 0.15s;
      min-height: 52px;
      display: block;
    }

    #msg-input:focus { border-color: var(--accent); }
    #msg-input:disabled { opacity: 0.5; }

    body { -webkit-user-drag: none; }
  </style>

</head>
<body>
  <div id="app">
    <main id="messages" role="log" aria-live="polite"></main>
    <footer id="input-area">
      <input
        id="msg-input"
        type="text"
        maxlength="500"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        enterkeyhint="send"
      />
    </footer>
  </div>

  <script>
    ["dragover", "dragenter", "drop"].forEach(evt => {
      document.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
    });
  </script>

</body>
</html>

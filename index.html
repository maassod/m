<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="HandheldFriendly" content="true" />
  <title>CHAT_ROOM</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, query,
      orderBy, limit, onSnapshot, serverTimestamp,
      getDocs, deleteDoc, doc, setDoc, getDoc
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBLczKyVaqT89GN_o_bY7E1F1AFthFultg",
      authDomain:        "proj-89c9c.firebaseapp.com",
      projectId:         "proj-89c9c",
      storageBucket:     "proj-89c9c.firebasestorage.app",
      messagingSenderId: "232360265495",
      appId:             "1:232360265495:web:8e54dad001ec00960ed952"
    };

    let sessionId = sessionStorage.getItem("chat_sid");
    if (!sessionId) {
      sessionId = Math.random().toString(36).slice(2);
      sessionStorage.setItem("chat_sid", sessionId);
    }

    const app  = initializeApp(firebaseConfig);
    const db   = collection(getFirestore(app), "messages");
    const fs   = getFirestore(app);
    const MAX_MESSAGES = 50;
    const TEN_MIN = 10 * 60 * 1000;

    const messagesEl  = document.getElementById("messages");
    const glowEl      = document.getElementById("bottom-glow");
    const typingEl    = document.getElementById("typing-indicator");

    /* ── helpers ── */
    function isNearBottom() {
      return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
    }
    function scrollToBottom() {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "smooth" });
    }
    function showGlow() { glowEl.classList.add("active"); }
    function hideGlow() { glowEl.classList.remove("active"); }

    messagesEl.addEventListener("scroll", () => {
      if (isNearBottom()) hideGlow();
    }, { passive: true });

    /* ── render message ── */
    function renderMessage(data, id, animate) {
      const line = document.createElement("div");
      line.id = id;
      line.className = "msg-line" + (animate ? " msg-new" : "");

      const dot = document.createElement("span");
      dot.className = "msg-dot";
      dot.setAttribute("data-own", data.sid === sessionId ? "1" : "0");

      const text = document.createElement("span");
      text.className = "msg-text";
      text.textContent = data.text;

      line.appendChild(dot);
      line.appendChild(text);
      // insert before typing indicator
      messagesEl.insertBefore(line, typingEl);
    }

    /* ── messages listener ── */
    const q = query(db, orderBy("timestamp", "asc"), limit(MAX_MESSAGES));
    let firstLoad = true;

    onSnapshot(q, (snapshot) => {
      const wasNearBottom = isNearBottom();

      snapshot.docChanges().forEach((change) => {
        if (change.type === "added") {
          const data   = change.doc.data();
          const isOwn  = data.sid === sessionId;
          renderMessage(data, change.doc.id, !firstLoad);

          if (!firstLoad) {
            if (isOwn) {
              setTimeout(() => { scrollToBottom(); hideGlow(); }, 10);
            } else if (!wasNearBottom) {
              showGlow();
            }
          }
        }
        if (change.type === "removed") {
          const el = document.getElementById(change.doc.id);
          if (el) el.remove();
        }
      });

      if (firstLoad || wasNearBottom) {
        setTimeout(() => {
          messagesEl.scrollTop = messagesEl.scrollHeight;
          hideGlow();
        }, 10);
      }
      firstLoad = false;
    });

    /* ── expire messages ── */
    async function enforceLimit() {
      const snap = await getDocs(query(db, orderBy("timestamp", "asc")));
      if (snap.size >= MAX_MESSAGES)
        await deleteDoc(doc(fs, "messages", snap.docs[0].id));
    }
    async function deleteExpiredMessages() {
      const snap = await getDocs(query(db, orderBy("timestamp", "asc")));
      const now  = Date.now();
      const dels = [];
      snap.forEach(d => {
        const ts = d.data().timestamp;
        if (!ts) return;
        const t = ts.toMillis ? ts.toMillis() : ts;
        if (now - t > TEN_MIN) dels.push(deleteDoc(doc(fs, "messages", d.id)));
      });
      if (dels.length) await Promise.all(dels);
    }
    deleteExpiredMessages();
    setInterval(deleteExpiredMessages, 60 * 1000);

    /* ── typing indicator ── */
    const typingDocRef = doc(fs, "typing", "status");
    let typingTimeout  = null;

    async function setTyping(isTyping) {
      try {
        const snap   = await getDoc(typingDocRef);
        const data   = snap.exists() ? snap.data() : {};
        const others = data.sessions || {};
        if (isTyping) {
          others[sessionId] = Date.now();
        } else {
          delete others[sessionId];
        }
        await setDoc(typingDocRef, { sessions: others });
      } catch (e) { console.error(e); }
    }

    // watch others typing
    onSnapshot(typingDocRef, (snap) => {
      if (!snap.exists()) { typingEl.style.display = "none"; return; }
      const sessions = snap.data().sessions || {};
      const now      = Date.now();
      const othersTyping = Object.entries(sessions).some(
        ([sid, ts]) => sid !== sessionId && (now - ts) < 5000
      );
      if (othersTyping) {
        typingEl.style.display = "flex";
        if (isNearBottom()) setTimeout(scrollToBottom, 10);
      } else {
        typingEl.style.display = "none";
      }
    });

    // input events
    const inputEl = document.getElementById("msg-input");

    inputEl.addEventListener("input", () => {
      if (inputEl.value.trim().length > 0) {
        setTyping(true);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => setTyping(false), 3000);
      } else {
        clearTimeout(typingTimeout);
        setTyping(false);
      }
    });

    inputEl.addEventListener("focus", () => {
      setTimeout(scrollToBottom, 150);
      hideGlow();
    });

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      if (text.length > 500) return;
      inputEl.value = "";
      clearTimeout(typingTimeout);
      setTyping(false);
      try {
        await enforceLimit();
        await addDoc(db, { text, sid: sessionId, timestamp: serverTimestamp() });
      } catch (err) { console.error(err); }
      inputEl.focus();
    }

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // clean up typing on page leave
    window.addEventListener("beforeunload", () => setTyping(false));
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #000000;
      --bg2:       #111111;
      --fg:        #ffffff;
      --dim:       #888888;
      --border:    #333333;
      --accent:    #ffffff;
      --font:      -apple-system, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      --radius:    18px;
      --dot-own:   #ffffff;
      --dot-other: #555555;
    }

    html { touch-action: manipulation; -webkit-text-size-adjust: 100%; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 1rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 860px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }

    #messages::before { content: ""; flex: 1; }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── message row ── */
    .msg-line {
      display: inline-flex;
      align-items: baseline;
      align-self: flex-start;
      gap: 0.45em;
      padding: 0.15rem 0.4rem;
      max-width: 90%;
    }

    .msg-dot {
      flex-shrink: 0;
      width: 3.5px;        /* 50% of original 7px */
      height: 3.5px;
      border-radius: 50%;
      background: var(--dot-other);
      position: relative;
      top: -0.05em;
      transition: background 0.2s;
    }

    .msg-dot[data-own="1"] { background: var(--dot-own); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-new { animation: fadeUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

    .msg-text {
      word-break: break-word;
      white-space: pre-wrap;
      color: var(--fg);
      font-size: 1rem;
    }

    /* ── typing indicator ── */
    #typing-indicator {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 0.15rem 0.4rem;
      align-self: flex-start;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dot-other);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
      40%           { transform: translateY(-5px); opacity: 1;   }
    }

    /* ── input area ── */
    #input-area {
      flex-shrink: 0;
      padding: 0.75rem 1rem 1rem;
      background: var(--bg);
      display: flex;
      align-items: center;
    }

    #msg-input {
      flex: 1;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      color: var(--fg);
      font-family: var(--font);
      font-size: 1rem;
      padding: 0.75em 1.1em;
      transition: border-color 0.15s;
      min-height: 52px;
    }
    #msg-input:focus   { border-color: var(--accent); }
    #msg-input:disabled { opacity: 0.5; }

    /* ── bottom glow ── */
    #bottom-glow {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      pointer-events: none;
      background: radial-gradient(ellipse 70% 60% at 50% 100%, rgba(255,255,255,0.07) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: 10;
    }
    #bottom-glow.active { opacity: 1; animation: glowPulse 2.4s ease-in-out infinite; }

    @keyframes glowPulse {
      0%   { opacity: 0.5; }
      50%  { opacity: 1;   }
      100% { opacity: 0.5; }
    }

    body { -webkit-user-drag: none; }
  </style>
</head>
<body>
  <div id="app">
    <main id="messages" role="log" aria-live="polite">
      <!-- typing indicator lives inside the scroll area, always last -->
      <div id="typing-indicator" aria-label="يكتب الآن">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </main>

    <div id="bottom-glow" aria-hidden="true"></div>

    <footer id="input-area">
      <input
        id="msg-input"
        type="text"
        maxlength="500"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        enterkeyhint="send"
      />
    </footer>
  </div>

  <script>
    ["dragover","dragenter","drop"].forEach(evt => {
      document.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
    });
  </script>
</body>
</html>
